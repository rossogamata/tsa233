# /etc/dovecot/conf.d/10-auth.conf
# Налаштування автентифікації Dovecot

# Дозволити передачу пароля відкритим текстом (для лабораторії)
# УВАГА: у production-середовищі встановити no та використовувати TLS
disable_plaintext_auth = no

# Механізми автентифікації
# plain  — базова автентифікація (логін + пароль відкритим текстом)
# login  — застаріла форма, потрібна для сумісності з деякими клієнтами
auth_mechanisms = plain login

# Підключити базу паролів із системних користувачів Linux (/etc/passwd)
passdb {
  driver = pam
}

# База даних користувачів — системні користувачі
userdb {
  driver = passwd
}
