# /etc/dovecot/conf.d/10-mail.conf
# Налаштування зберігання пошти Dovecot

# Формат зберігання — Maildir (одне повідомлення = один файл)
# ~/Maildir — директорія у домашній папці кожного користувача
mail_location = maildir:~/Maildir

# Простір імен для папок (INBOX та вкладені папки)
namespace inbox {
  inbox = yes

  # Розділювач папок (Thunderbird використовує крапку або слеш)
  separator = /

  # Поштова скринька за замовчуванням
  mailbox Drafts {
    special_use = \Drafts
  }
  mailbox Junk {
    special_use = \Junk
  }
  mailbox Sent {
    special_use = \Sent
  }
  mailbox "Sent Messages" {
    special_use = \Sent
  }
  mailbox Trash {
    special_use = \Trash
  }
}

# Права доступу до поштових файлів
mail_privileged_group = mail
