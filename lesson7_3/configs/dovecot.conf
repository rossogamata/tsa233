# /etc/dovecot/dovecot.conf
# Головний конфігураційний файл Dovecot

# Увімкнені протоколи
protocols = imap pop3

# Слухати на всіх інтерфейсах
listen = *

# Включити конфігураційні файли з директорії conf.d
!include conf.d/*.conf

# Включити локальні перевизначення (якщо файл існує)
!include_try local.conf
